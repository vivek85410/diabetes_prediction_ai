<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthAI | Analysis Result</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --accent-safe: #10b981; /* Green */
            --accent-danger: #ef4444; /* Red */
            --primary-blue: #2d5cf7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .result-container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Animated Status Circle */
        .status-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            position: relative;
        }

        /* Example: Positive Result Styling */
        .is-diabetic {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-danger);
            border: 4px solid var(--accent-danger);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
            animation: pulse-red 2s infinite;
        }

        /* Example: Negative Result Styling */
        .not-diabetic {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-safe);
            border: 4px solid var(--accent-safe);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .result-text {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        /* Buttons Section */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-home {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        .btn-home:hover {
            background: rgba(255,255,255,0.1);
        }

        .btn-again {
            background: var(--primary-blue);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(45, 92, 247, 0.3);
        }

        .btn-again:hover {
            transform: translateY(-2px);
            background: #406aff;
        }

        /* Decorative background elements */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-blue);
            filter: blur(150px);
            opacity: 0.2;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="result-container">
        <div class="status-icon is-diabetic">
            ⚠️
        </div>

        <div class="result-display">
            <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; color: #64748b; margin-bottom: 5px;">Analysis Complete</p>
            <h1>{{result}}</h1>
            <p class="result-text">
                The AI model suggests a high probability of {{result}} based on the medical parameters provided. Please consult with a healthcare professional.
            </p>
        </div>

        <div class="button-group">
            <a href="/predictdata" class="btn btn-again">Analyze Another Patient</a>
            <a href="/" class="btn btn-home">Return to Home</a>
        </div>
    </div>

</body>
</html>
