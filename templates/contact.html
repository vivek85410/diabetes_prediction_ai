<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | HealthAI Developer</title>
    <style>
        :root {
            --primary: #2d5cf7;
            --secondary: #00d2ff;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Animated Background Elements */
        .circle-blur {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.2;
            animation: moveAround 15s infinite alternate;
        }

        @keyframes moveAround {
            0% { top: 10%; left: 10%; }
            100% { top: 60%; left: 70%; }
        }

        /* Navigation */
        nav {
            padding: 1.5rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.4rem;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(to right, #2d5cf7, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* Main Contact Section */
        .contact-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .contact-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            color: white;
            box-shadow: 0 10px 20px rgba(45, 92, 247, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .role {
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .info-list {
            list-style: none;
            margin-bottom: 40px;
        }

        .info-item {
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .info-item a {
            color: #f8fafc;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            padding: 8px 15px;
            border-radius: 10px;
        }

        .info-item a:hover {
            background: rgba(45, 92, 247, 0.1);
            color: var(--primary);
            transform: translateX(10px);
        }

        .icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
        }

        /* Back Button */
        .btn-back {
            display: inline-block;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: color 0.3s;
        }

        .btn-back:hover {
            color: #fff;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .contact-card { padding: 40px 20px; }
            h1 { font-size: 2rem; }
            .info-item a { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="circle-blur"></div>

    <nav>
        <a href="/" class="logo">HealthAI</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/predictdata">Predictor</a>
        </div>
    </nav>

    <div class="contact-container">
        <div class="contact-card">
            <div class="profile-img">VK</div>
            <p class="role">Lead Developer</p>
            <h1>Vivek Kumar</h1>
            
            <div class="info-list">
                <div class="info-item">
                    <span class="icon">📧</span>
                    <a href="mailto:singhvivek49966@gmail.com">singhvivek49966@gmail.com</a>
                </div>
                <div class="info-item">
                    <span class="icon">📞</span>
                    <a href="tel:7369985487">+91 7369985487</a>
                </div>
                <div class="info-item">
                    <span class="icon">📍</span>
                    <a href="#">India</a>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin-bottom: 30px;">
            
            <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 20px;">
                Available for collaborations on AI and Health-Tech projects.
            </p>

            <a href="/" class="btn-back">
                ← Back to Project
            </a>
        </div>
    </div>

</body>
</html>
